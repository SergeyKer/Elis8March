<!DOCTYPE html>
<!-- Открытку создал Кернасовский Сергей -->

<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Открытка к 8 Марта</title>
  
  <!-- Предзагрузка соединений для шрифтов и картинок -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  
  <!-- Подключаем милый округлый шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

  <!-- Подключаем библиотеку для конвертации HTML в картинку (defer не блокирует рендеринг) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
  <script>
    // Моментально скрываем форму и показываем открытку, если есть сохраненное имя, чтобы избежать моргания экрана
    try {
      if (sessionStorage.getItem('cardName')) {
        const style = document.createElement('style');
        style.innerHTML = '#formSection { display: none !important; } #cardSection { display: flex !important; }';
        document.head.appendChild(style);
      }
    } catch(e) {}
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 40px 20px;
      font-family: 'Nunito', 'Comic Sans MS', sans-serif;
      /* Спокойный, однотонный матовый фон без точек */
      background-color: #f2e9ed;
    }
    
    /* Стили для формы */
    .form-container {
      margin: auto;
      width: 380px;
      padding: 30px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
      text-align: center;
      border: 3px solid #ffb6c1;
    }
    h2 { color: #ff69b4; margin-bottom: 20px; font-weight: 800; font-size: 1.5rem; }
    label { display: block; color: #ff69b4; margin-bottom: 8px; font-weight: 800; text-align: center; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #ffb6c1;
      border-radius: 12px;
      margin-bottom: 20px;
      font-size: 1.1rem;
      font-family: 'Nunito', sans-serif;
      outline: none;
    }
    input:focus { border-color: #ff1493; }
    
    button.main-btn {
      width: 80%;
      margin: 0 auto;
      display: block;
      padding: 18px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
      transition: transform 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    button.main-btn:hover { transform: scale(1.05); }

    /* Контейнер для отображения после создания (обертка для открытки и кнопки) */
    #cardSection {
      margin: auto;
      display: none;
      flex-direction: column;
      align-items: center;
      animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    /* Стили для самой открытки (именно она станет картинкой) */
    .card-container {
      width: 628px; /* Ширина осталась прежней */
      min-height: 330px; /* Высота уменьшена на 30% (было 471px) */
      padding: 30px 40px; /* Вернули ширину рамки по бокам, высоту немного уменьшили */
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(145deg, #ffffff, #fcf5f8);
      border-radius: 30px;
      /* Эффект объема: внешняя тень + внутренние тени для имитации толщины картона */
      box-shadow: 
        0 25px 50px rgba(180, 150, 165, 0.4),
        inset 0 4px 10px rgba(255, 255, 255, 0.9),
        inset 0 -4px 10px rgba(0, 0, 0, 0.05);
      text-align: center;
      /* Ровная сплошная линия вместо пунктира */
      border: 4px solid #ffb6c1;
      position: relative;
      overflow: hidden;
    }
    
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }
    
    h1 { color: #ff1493; font-size: 1.8rem; margin-bottom: 10px; font-weight: 800; }
    .greeting {
      color: #ff69b4;
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    p { color: #555; line-height: 1.6; margin-bottom: 20px; font-size: 1.1rem; }
    
    /* Красивые мультяшные картинки-цветы */
    .flowers { 
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 20px 0; /* Уменьшили отступы, чтобы уместиться в меньшую высоту */
    }
    .flowers img {
      width: 38px; /* Уменьшено на 30% (было 55px) */
      height: 38px; /* Уменьшено на 30% (было 55px) */
      animation: float 3s infinite ease-in-out;
      will-change: transform;
    }
    .flowers img:nth-child(even) { animation-delay: 1.5s; }
    .flowers img:nth-child(3n) { animation-delay: 0.7s; }
    
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* Декоративные элементы на фоне открытки */
    .card-decoration {
      position: absolute;
      width: 60px;
      height: 60px;
      opacity: 0.15;
      z-index: 0;
    }
    .dec-1 { top: -15px; left: -15px; transform: rotate(-45deg); width: 80px; height: 80px; }
    .dec-2 { bottom: -15px; right: -15px; transform: rotate(135deg); width: 80px; height: 80px; }

    /* Контент открытки поверх декораций */
    .card-content-inner {
      position: relative;
      z-index: 1;
    }

    /* Стили для кнопки сохранения */
    .save-btn {
      margin-top: 15px;
      padding: 18px 24px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
      transition: transform 0.2s;
      font-family: 'Nunito', sans-serif;
    }
    .save-btn:hover { transform: scale(1.05); }

    /* Адаптация под экраны мобильных телефонов */
    @media (max-width: 650px) {
      .card-container {
        width: 95vw;
        min-height: auto;
        padding: 25px 15px;
      }
      .form-container {
        width: 90vw;
      }
      .flowers img {
        width: 30px;
        height: 30px;
      }
      h2 {
        font-size: 1.3rem;
      }
      button.main-btn {
        font-size: 1rem;
        padding: 14px;
      }
      h1 {
        font-size: 1.5rem;
      }
      .save-btn {
        width: 80vw;
        padding: 14px;
        font-size: 1rem;
      }
      .card-decoration {
        width: 30px;
      }
    }
  </style>
</head>
<body>

  <!-- Блок с формой -->
  <div class="form-container" id="formSection">
    <h2>Поздравить с 8 Марта!</h2>
    <label>Введите имя (кому)</label>
    <input type="text" id="nameInput" placeholder="Имя получателя" onfocus="this.placeholder=''" onblur="this.placeholder='Имя получателя'">
    <button type="button" class="main-btn" onclick="generateAndShowCard()">Создать открытку</button>
  </div>

  <!-- Блок с открыткой и кнопкой сохранения -->
  <div id="cardSection" style="display: none;">
    <!-- То, что будет сохраняться как картинка -->
    <div class="card-container" id="cardContent">
      <!-- Декорации по углам -->
      <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f338.png" class="card-decoration dec-1" crossorigin="anonymous" alt="">
      <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f338.png" class="card-decoration dec-2" crossorigin="anonymous" alt="">
      
      <div class="card-content-inner">
        <!-- Верхний ряд: 5 двигающихся картинок-цветов -->
        <div class="flowers">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f33c.png" crossorigin="anonymous" alt="blossom">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f337.png" crossorigin="anonymous" alt="tulip">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f490.png" crossorigin="anonymous" alt="bouquet">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f339.png" crossorigin="anonymous" alt="rose">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f338.png" crossorigin="anonymous" alt="cherry blossom">
        </div>
        <h1>С 8 Марта!</h1>
        <div class="greeting" id="cardGreeting"></div>
        <p id="cardText"></p>
        <div class="flowers">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f33a.png" crossorigin="anonymous" alt="hibiscus">
          <img src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f33b.png" crossorigin="anonymous" alt="sunflower">
          <img id="purpleTulip" src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f337.png" crossorigin="anonymous" alt="purple tulip" style="filter: hue-rotate(270deg); -webkit-filter: hue-rotate(270deg);">
        </div>
      </div>
     
    <!-- Кнопка сохранения (она в картинку не попадёт) -->
    <button type="button" class="save-btn" onclick="saveAsJPG()">Сохранить открытку</button>
    <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 12px; align-items: center;">
      <a href="#" onclick="regenerateText(event)" style="color: #00c6ff; text-decoration: none; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600; border-bottom: 1px dashed #00c6ff; transition: color 0.2s;">Сгенерировать другой текст</a>
      <a href="#" onclick="resetCard(event)" style="color: #00c6ff; text-decoration: none; font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 600; border-bottom: 1px dashed #00c6ff; transition: color 0.2s;">Ввести новое имя</a>
    </div>
  </div>

  <script>
    window.addEventListener('load', () => {
      const imgElement = document.getElementById('purpleTulip');
      if (imgElement) {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          
          try {
            // Отрисовываем оригинальную картинку
            ctx.drawImage(img, 0, 0);
            
            // Читаем пиксели (этот метод надежно работает во всех браузерах, включая старые Safari на iOS)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // Вручную меняем цвета пикселей (красный канал меняем с синим)
            // Это сделает бутон сине-фиолетовым, а зеленый стебель при этом останется зеленым!
            for (let i = 0; i < data.length; i += 4) {
              const r = data[i];
              data[i] = data[i + 2]; // Красный становится синим
              data[i + 2] = r;       // Синий становится красным
            }
            
            // Возвращаем измененные пиксели на холст
            ctx.putImageData(imageData, 0, 0);
            
            // Заменяем картинку на уже перекрашенную
            imgElement.src = canvas.toDataURL('image/png');
            
            // Теперь безопасно убираем CSS-фильтры
            imgElement.style.filter = 'none'; 
            imgElement.style.webkitFilter = 'none'; 
          } catch (e) {
            console.error("Ошибка при ручном перекрашивании тюльпана: ", e);
          }
        };
        img.src = 'https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f337.png';
      }

      // Проверяем, есть ли сохраненное имя (чтобы восстановить открытку после F5)
      try {
        const savedName = sessionStorage.getItem('cardName');
        if (savedName) {
          document.getElementById('nameInput').value = savedName;
          setTimeout(generateAndShowCard, 100);
        }
      } catch (e) {
        console.warn('SessionStorage не поддерживается для локальных файлов в этом браузере', e);
      }
    });

    const congratulations = [
      "Поздравляю с этим прекрасным весенним праздником! Пусть каждый день будет наполнен радостью, улыбками и искренним теплом. Здоровья, счастья и исполнения желаний!",
      "Пусть в этот весенний день на душе расцветают цветы, а в жизни царят гармония и любовь. С праздником 8 Марта!",
      "С Международным женским днём! Желаю море улыбок, океан счастья и бесконечного весеннего настроения!",
      "Пусть каждый день приносит только радость и приятные сюрпризы. С 8 Марта, самым нежным и прекрасным праздником весны!",
      "С 8 Марта! Пусть в жизни всегда будет место для чуда, а каждый новый день дарит улыбки, вдохновение и тепло близких."
    ];

    window.generateAndShowCard = function() {
      const nameValue = document.getElementById('nameInput').value.trim();
      
      if (!nameValue) {
        alert('Пожалуйста, введите имя.');
        return;
      }

      // Делаем первую букву заглавной
      const capitalizedName = nameValue.charAt(0).toUpperCase() + nameValue.slice(1);
      
      // Умное определение обращения по последней букве и словарю
      const lowerName = nameValue.toLowerCase();
      const lastChar = lowerName.slice(-1);
      
      let greetingPrefix = "Дорогая"; // По умолчанию женский род
      
      // Список частых женских ласковых слов (без очевидных суффиксов)
      const femaleDiminutives = [
        'зайка', 'зая', 'киса', 'рыбка', 'птица', 'крошка', 'малышка', 
        'красотка', 'умница', 'девочка', 'конфетка', 'милая', 'бусинка', 
        'куколка', 'принцесса', 'королева', 'фея'
      ];
      
      if (['о', 'е', 'ё'].includes(lastChar)) {
        greetingPrefix = "Дорогое моё"; // Для слов вроде "Солнышко", "Золотце", "Счастье"
      } else if (!['а', 'я', 'ь', 'и', 'ы'].includes(lastChar)) {
        // Если не заканчивается на типично женские окончания
        greetingPrefix = "Дорогой мой";
      } else if (femaleDiminutives.includes(lowerName) || lowerName.endsWith('чка') || lowerName.endsWith('нька') || lowerName.endsWith('уля') || lowerName.endsWith('уся')) {
        // Если слово из списка или имеет ласковый суффикс (лапочка, мамуля, кисонька, анечка)
        greetingPrefix = "Дорогая моя";
      }

      document.getElementById('cardGreeting').textContent = greetingPrefix + ' ' + capitalizedName + '!';

      const randomIndex = Math.floor(Math.random() * congratulations.length);
      document.getElementById('cardText').textContent = congratulations[randomIndex];

      document.getElementById('formSection').style.display = 'none';
      document.getElementById('cardSection').style.display = 'flex';

      // Сохраняем имя в sessionStorage, чтобы при обновлении страницы (F5) восстановить открытку
      try {
        sessionStorage.setItem('cardName', nameValue);
      } catch (e) {
        console.warn('SessionStorage не поддерживается для локальных файлов в этом браузере', e);
      }
    }

    window.saveAsJPG = function() {
      const cardElement = document.getElementById('cardContent');
      const originalBorder = cardElement.style.border;
      
      // На мобильных устройствах (и особенно в Telegram) загрузка файлов часто блокируется.
      // Поэтому мы покажем готовую картинку поверх экрана, чтобы пользователь мог ее зажать и сохранить.
      
      // Изменяем текст кнопки на время загрузки
      const saveBtn = document.querySelector('.save-btn');
      const originalBtnText = saveBtn.textContent;
      saveBtn.textContent = 'Создаем картинку...';
      saveBtn.style.opacity = '0.7';
      
      // Временно убираем анимации перед скриншотом, чтобы они не размазались
      const animatedElements = document.querySelectorAll('.flowers img, #cardSection');
      animatedElements.forEach(el => {
        el.style.animation = 'none';
      });

      // Используем библиотеку html2canvas
      html2canvas(cardElement, { 
        scale: 2, 
        backgroundColor: '#f2e9ed',
        useCORS: true, 
        allowTaint: true 
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/jpeg', 0.95);
        
        // Превращаем dataURL в Blob (решает проблемы скачивания и долгого нажатия в WebView/Telegram)
        const arr = imgData.split(',');
        const mime = arr[0].match(/:(.*?);/)[1];
        const bstr = atob(arr[1]);
        let n = bstr.length;
        const u8arr = new Uint8Array(n);
        while(n--) { u8arr[n] = bstr.charCodeAt(n); }
        const blob = new Blob([u8arr], {type: mime});
        const blobUrl = URL.createObjectURL(blob);
        
        const rawName = document.getElementById('cardGreeting').textContent.replace('Дорогая ', '').replace('!', '').trim() || 'Имя';
        const fileName = 'Otkrytka_' + rawName + '.jpg';

        // Возвращаем кнопку в нормальное состояние
        saveBtn.textContent = originalBtnText;
        saveBtn.style.opacity = '1';
        
        // Возвращаем анимации
        animatedElements.forEach(el => {
          el.style.animation = '';
        });

        // Проверяем, мобильное ли это устройство (или встроенный браузер типа Telegram/ВК)
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        
        // Более надежная проверка на встроенные браузеры мессенджеров (Telegram, VK, Instagram и любые Android WebView)
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        // Расширенная проверка на Telegram (иногда он скрывает свой User-Agent, но оставляет объекты в window или маркеры wv)
        const isTelegramOrWebView = /Telegram|Instagram|FBAN|FBAV|VK|Viber|wv/i.test(ua) || /Android.*Version\/[\d\.]+.*Chrome/i.test(ua) || (typeof window.TelegramWebviewProxy !== "undefined");
        
        if (isMobile) {
          // ДЛЯ ТЕЛЕФОНОВ: Показываем картинку и умную кнопку
          let modal = document.getElementById('mobileImageModal');
          if (!modal) {
            modal = document.createElement('div');
            modal.id = 'mobileImageModal';
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100vw';
            modal.style.height = '100vh';
            modal.style.backgroundColor = 'rgba(0,0,0,0.9)';
            modal.style.zIndex = '9999';
            modal.style.display = 'flex';
            modal.style.flexDirection = 'column';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.padding = '20px';
            document.body.appendChild(modal);
          }
          
          let subText = "Нажмите кнопку ниже или зажмите картинку пальцем.";
          
          modal.innerHTML = `
            <p style="color: white; font-family: 'Nunito', sans-serif; font-size: 1.1rem; text-align: center; margin-bottom: 15px; font-weight: 800;">
              ✨ Ваша открытка готова! ✨<br>
              <span style="font-size: 0.95rem; font-weight: 600; opacity: 0.9; line-height: 1.3; display: inline-block; margin-top: 10px;">${subText}</span>
            </p>
            <img src="${blobUrl}" style="max-width: 100%; max-height: 55vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: auto;">
            <button id="actionBtn" style="margin-top: 25px; padding: 14px 30px; background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4); width: 85%;">Сохранить</button>
            <button onclick="document.getElementById('mobileImageModal').style.display='none'" style="margin-top: 15px; padding: 10px 30px; background: transparent; color: #ffb6c1; border: 2px solid #ffb6c1; border-radius: 12px; font-size: 1rem; font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;">Вернуться</button>
          `;
          modal.style.display = 'flex';

          // Обработчик для умного сохранения/шаринга через систему
          document.getElementById('actionBtn').onclick = function() {
            try {
              const file = new File([u8arr], fileName, {type: mime});
              
              // На iOS функция Share работает лучше всего (сохраняет прямо в Фото галерею)
              if (isIOS && navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                  files: [file]
                }).catch(err => {
                  console.log('Share canceled or failed', err);
                  // Если Share отменен или заблокирован, пробуем обычное скачивание (в Файлы)
                  if (err.name !== 'AbortError') {
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = fileName;
                    a.click();
                  }
                });
              } else {
                // На Android (включая Telegram WebView) прямое скачивание Blob-ссылки перехватывается системным загрузчиком
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = fileName;
                a.click();
              }
            } catch(e) {
              alert('Пожалуйста, просто зажмите картинку пальцем и выберите "Сохранить в галерею".');
            }
          };
          
        } else {
          // ДЛЯ КОМПЬЮТЕРОВ: Скачиваем файл как обычно
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = fileName;
          link.click();
        }
      }).catch(err => {
        saveBtn.textContent = originalBtnText;
        saveBtn.style.opacity = '1';
        alert("Произошла ошибка при создании открытки. Попробуйте еще раз.");
      });
    }

    // Функция для генерации нового случайного текста
    window.regenerateText = function(event) {
      if (event) event.preventDefault();
      const randomIndex = Math.floor(Math.random() * congratulations.length);
      // Чтобы дважды подряд не выпал один и тот же текст, можно добавить проверку, но для простоты оставляем так
      document.getElementById('cardText').textContent = congratulations[randomIndex];
    }

    // Функция для возврата на стартовый экран
    window.resetCard = function(event) {
      event.preventDefault(); // Предотвращаем прыжок страницы наверх из-за href="#"
      // Очищаем память, чтобы при обновлении не загружалась старая открытка
      try {
        sessionStorage.removeItem('cardName');
      } catch(e) {}
      
      // Показываем форму и скрываем открытку
      document.getElementById('cardSection').style.display = 'none';
      document.getElementById('formSection').style.display = 'block';
      
      // Очищаем поле ввода для нового имени
      document.getElementById('nameInput').value = '';
      
      // Убираем возможные блокирующие стили из head (если страница была загружена сразу с открыткой)
      const dynamicStyles = document.querySelectorAll('style');
      dynamicStyles.forEach(style => {
        if (style.innerHTML.includes('#formSection')) {
          style.remove();
        }
      });
    }
  </script>

</body></html>
